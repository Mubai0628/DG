<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSeek Workbench Table Capture</title>
    <style>
      body {
        box-sizing: border-box;
        width: 420px;
        margin: 0;
        padding: 14px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #17202a;
        background: #ffffff;
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 1px solid #1b4d89;
        border-radius: 6px;
        color: #ffffff;
        background: #1f5fa8;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.7;
      }

      #summary {
        margin: 12px 0;
        white-space: pre-line;
        font-size: 13px;
        line-height: 1.45;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 260px;
        resize: vertical;
        border: 1px solid #c6ced8;
        border-radius: 6px;
        padding: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <button id="capture" type="button">Capture visible tables</button>
    <div id="summary" role="status">Waiting for user action.</div>
    <textarea
      id="preview"
      readonly
      aria-label="Sanitized JSON preview"
      spellcheck="false"
    ></textarea>
    <script type="module" src="./src/popup.js"></script>
  </body>
</html>
